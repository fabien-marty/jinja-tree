name: ci

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

jobs:

  lint_and_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event. Selected python version is ${{ matrix.python-version }}."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          make install
        env:
          UV_PYTHON: ${{ matrix.python-version }}
      - name: Run lint
        run: |
          make lint
        env:
          FIX: 0
      - name: Run tests
        run: |
          make test
      - name: Run doc
        if: matrix.python-version == '3.12'
        run: |
          make doc
      - name: Check modified files
        if: matrix.python-version == '3.12'
        run: |
          make no-dirty
      - name: Clean
        if: matrix.python-version == '3.12'
        run: |
          make clean
      - name: Check modified files (after clean)
        if: matrix.python-version == '3.12'
        run: |
          make no-dirty

  publish_pypi:
    runs-on: ubuntu-latest
    needs: lint_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "latest"
          python-version: 3.12
      - name: Install
        run: |
          make install
      - name: Override BASEURL in README.md
        env:
          BASEURL: https://github.com/fabien-marty/jinja-tree/blob/main/
        run: |
          make doc
      - name: Publish on Pypi
        run: |
          VERSION=$(echo "${{ github.ref }}" | sed -e 's|refs/tags/v||')
          echo "VERSION: $VERSION"
          uvx --from=toml-cli toml set --toml-path=pyproject.toml project.version "$VERSION"
          make publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  publish_docker:
    runs-on: ubuntu-latest
    needs: ["lint_and_test"]
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 
      - name: Log in to the Container registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor:
            latest=true
          tags: |
            type=ref,event=tag
      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  mergify-ci-status: # this is a special job for mergify
    runs-on: ubuntu-24.04
    needs: ["lint_and_test", "publish_docker"]
    steps:
      - name: Status
        run: |
          echo "OK"
